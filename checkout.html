<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | TaskFlow</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <style>
    .checkout-container {
      display: flex;
      gap: 40px;
      margin-top: 40px;
    }
    .checkout-form {
      flex: 2;
      padding: 40px;
    }
    .checkout-summary {
      flex: 1;
      height: fit-content;
      padding: 30px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: var(--color-silver);
    }
    .form-control {
      width: 100%;
      padding: 12px 15px;
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      color: white;
      font-family: inherit;
    }
    .form-control:focus {
      outline: none;
      border-color: var(--color-indigo);
      box-shadow: 0 0 10px var(--color-indigo-glow);
    }
    .form-row {
      display: flex;
      gap: 20px;
    }
    .form-row .form-group {
      flex: 1;
    }
    .summary-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      font-size: 0.9rem;
      color: var(--color-silver);
    }
    .summary-total {
      display: flex;
      justify-content: space-between;
      font-size: 1.5rem;
      font-weight: bold;
      border-top: 1px solid var(--color-silver);
      padding-top: 15px;
      margin-top: 15px;
      margin-bottom: 30px;
    }
    
    @media (max-width: 768px) {
      .checkout-container {
        flex-direction: column-reverse;
      }
      .form-row {
        flex-direction: column;
        gap: 0;
      }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar glass">
    <a href="index.html" class="logo">Task<span>Flow</span></a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="products.html">Products</a>
      <a href="categories.html">Categories</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </div>
  </nav>

  <main class="container">
    <h1 class="section-title" style="text-align: left; margin-bottom: 20px;">Checkout</h1>
    
    <div class="checkout-container">
      <div class="checkout-form glass">
        <h2 style="margin-bottom: 30px;">Shipping Information</h2>
        
        <form id="checkout-form" action="order-confirmation.html">
          <div class="form-row">
            <div class="form-group">
              <label>First Name</label>
              <input type="text" class="form-control" required>
            </div>
            <div class="form-group">
              <label>Last Name</label>
              <input type="text" class="form-control" required>
            </div>
          </div>
          
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" class="form-control" required>
          </div>
          
          <div class="form-group">
            <label>Address</label>
            <input type="text" class="form-control" required>
          </div>
          
          <div class="form-row">
            <div class="form-group">
              <label>City</label>
              <input type="text" class="form-control" required>
            </div>
            <div class="form-group">
              <label>State / Province</label>
              <input type="text" class="form-control" required>
            </div>
            <div class="form-group">
              <label>Zip / Postal Code</label>
              <input type="text" class="form-control" required>
            </div>
          </div>

          <h2 style="margin-bottom: 30px; margin-top: 40px;">Payment details</h2>
          <div class="form-group">
            <label>Name on Card</label>
            <input type="text" class="form-control" required>
          </div>
          <div class="form-group">
            <label>Card Number</label>
            <input type="text" class="form-control" placeholder="0000 0000 0000 0000" required>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Expiration Date</label>
              <input type="text" class="form-control" placeholder="MM/YY" required>
            </div>
            <div class="form-group">
              <label>CVC</label>
              <input type="text" class="form-control" required>
            </div>
          </div>
          
          <button type="submit" class="btn-primary" style="width: 100%; padding: 15px; margin-top: 20px; font-size: 1.1rem;">Place Order</button>
        </form>
      </div>
      
      <div class="checkout-summary glass">
        <h2 style="margin-bottom: 20px;">Order Summary</h2>
        <div id="checkout-items"></div>
        <div class="summary-total">
          <span>Total</span>
          <span id="checkout-total">$0.00</span>
        </div>
      </div>
    </div>
  </main>

  <script src="js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const items = Cart.getItems();
      if (items.length === 0) {
        window.location.href = 'cart.html';
        return;
      }

      const itemsContainer = document.getElementById('checkout-items');
      items.forEach(item => {
        const row = document.createElement('div');
        row.className = 'summary-item';
        row.innerHTML = `
          <span>${item.quantity}x ${item.name}</span>
          <span>$${(item.price * item.quantity).toFixed(2)}</span>
        `;
        itemsContainer.appendChild(row);
      });

      document.getElementById('checkout-total').textContent = `$${Cart.getTotal().toFixed(2)}`;
      
      // Handle form submission to clear cart and generate random order ID
      document.getElementById('checkout-form').addEventListener('submit', (e) => {
        e.preventDefault();
        // Clear cart
        localStorage.removeItem('taskflow_cart');
        const orderId = 'TF' + Math.floor(Math.random() * 1000000);
        window.location.href = `order-confirmation.html?orderId=${orderId}`;
      });
    });
  </script>
</body>
</html>
