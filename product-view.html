<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product View | TaskFlow</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <style>
    .product-details-container {
      display: flex;
      gap: 50px;
      margin-top: 40px;
      margin-bottom: 80px;
    }
    .product-image-large {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 50px;
    }
    .product-image-large img {
      max-width: 100%;
      max-height: 500px;
      object-fit: contain;
      filter: drop-shadow(0 20px 40px rgba(0, 0, 0, 0.6));
      animation: float 6s ease-in-out infinite;
    }
    .product-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .product-info h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }
    .ratings {
      color: #ffd700;
      margin-bottom: 20px;
      font-size: 1.2rem;
    }
    .ratings span {
      color: var(--color-text-muted);
      font-size: 1rem;
      margin-left: 10px;
    }
    .price-large {
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--color-indigo);
      margin-bottom: 30px;
    }
    .description {
      font-size: 1.1rem;
      color: var(--color-text-muted);
      line-height: 1.6;
      margin-bottom: 40px;
    }
    .action-buttons {
      display: flex;
      gap: 20px;
    }
    
    @media (max-width: 768px) {
      .product-details-container {
        flex-direction: column;
      }
      .product-image-large {
        padding: 20px;
      }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar glass">
    <a href="index.html" class="logo">Task<span>Flow</span></a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="products.html">Products</a>
      <a href="categories.html">Categories</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </div>
    <div class="nav-icons">
      <a href="search.html" style="margin-right: 20px; color: var(--color-silver);">🔍</a>
      <a href="cart.html" class="cart-icon">
        🛒
        <span class="cart-count" style="display: none;">0</span>
      </a>
    </div>
  </nav>

  <main class="container">
    <div id="product-not-found" style="display: none; text-align: center; padding: 100px;">
      <h2>Product not found</h2>
      <a href="products.html" class="btn-primary" style="display: inline-block; margin-top: 20px;">Back to Products</a>
    </div>

    <div id="product-view" class="product-details-container" style="display: none;">
      <div class="product-image-large glass">
        <img id="pv-image" src="" alt="Product">
      </div>
      <div class="product-info">
        <h1 id="pv-title">Loading...</h1>
        <div class="ratings" id="pv-ratings">
          ★★★★☆ <span>(0 reviews)</span>
        </div>
        <div class="price-large" id="pv-price">$0.00</div>
        <div class="description" id="pv-description"></div>
        <div class="action-buttons">
          <button class="btn-primary" id="btn-add-cart" style="padding: 15px 40px; font-size: 1.2rem;">Add to Cart</button>
        </div>
      </div>
    </div>

    <!-- Related Products -->
    <section id="related-section" style="display: none;">
      <h2 class="section-title">Related Products</h2>
      <div class="product-grid" id="related-products"></div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="glass container" style="margin-bottom: 20px;">
    <div class="logo" style="font-size: 1.5rem;">Task<span>Flow</span></div>
    <div class="footer-links">
      <a href="about.html">About Us</a>
      <a href="contact.html">Contact</a>
      <a href="#">Privacy Policy</a>
      <a href="#">Terms of Service</a>
    </div>
    <div style="color: var(--color-text-muted); font-size: 0.9rem;">
      &copy; 2026 TaskFlow. All rights reserved.
    </div>
  </footer>

  <div id="scroll-top">↑</div>

  <script src="js/products.js"></script>
  <script src="js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const productId = urlParams.get('id');
      const product = ProductAPI.getById(productId);

      if (!product) {
        document.getElementById('product-not-found').style.display = 'block';
        return;
      }

      document.getElementById('product-view').style.display = 'flex';
      document.getElementById('pv-title').textContent = product.name;
      document.getElementById('pv-image').src = product.image;
      document.getElementById('pv-price').textContent = `$${product.price.toFixed(2)}`;
      document.getElementById('pv-description').textContent = product.description;
      document.getElementById('pv-ratings').innerHTML = `★★★★☆ <span>(${product.reviews} reviews)</span>`;
      
      document.title = `${product.name} | TaskFlow`;

      document.getElementById('btn-add-cart').addEventListener('click', () => {
        Cart.addItem(product);
        // Optional visual feedback
        const btn = document.getElementById('btn-add-cart');
        const originalText = btn.textContent;
        btn.textContent = 'Added!';
        setTimeout(() => btn.textContent = originalText, 1500);
      });

      // Related Products (same category)
      const related = ProductAPI.getByCategory(product.category).filter(p => p.id !== product.id).slice(0, 3);
      if (related.length > 0) {
        document.getElementById('related-section').style.display = 'block';
        const relatedContainer = document.getElementById('related-products');
        related.forEach(rel => {
          const card = document.createElement('div');
          card.className = 'product-card glass floating';
          card.innerHTML = `
            <a href="product-view.html?id=${rel.id}" class="product-image">
              <img src="${rel.image}" alt="${rel.name}">
            </a>
            <a href="product-view.html?id=${rel.id}">
              <h3 class="product-title">${rel.name}</h3>
            </a>
            <p class="product-price">$${rel.price.toFixed(2)}</p>
            <button class="btn-primary" onclick="Cart.addItem({id: ${rel.id}, name: '${rel.name}', price: ${rel.price}, image: '${rel.image}'})">Add to Cart</button>
          `;
          relatedContainer.appendChild(card);
        });
      }
    });
  </script>
</body>
</html>
